name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Enable pnpm (Corepack)
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Prepare ZIP
        run: |
          # ensure dist exists
          if [ ! -d dist ]; then echo "dist/ not found"; exit 1; fi
          ZIP_NAME="norish-quick-import-${{ github.ref_name }}.zip"
          cd dist
          zip -r ../${ZIP_NAME} ./*



      - name: Determine prerelease
        id: prerelease
        run: |
          # Extract tag name from GITHUB_REF (refs/tags/<tag>)
          TAG="${GITHUB_REF#refs/tags/}"
          # remove leading 'v' if present
          V="${TAG#v}"
          # take numeric part before any prerelease suffix (e.g. 1.2.3 from 1.2.3-beta)
          NUM="${V%%-*}"
          MAJOR="${NUM%%.*}"
          if [ -z "$MAJOR" ]; then MAJOR=0; fi
          if [ "$MAJOR" -lt 1 ]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release and upload asset
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: norish-quick-import-${{ github.ref_name }}.zip
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
