<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 12px;
        width: 360px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        margin-bottom: 8px;
      }
      button {
        margin-right: 8px;
      }
      .row {
        display: flex;
        gap: 8px;
      }
    </style>
  </head>
  <body>
    <div
      style="display: flex; align-items: center; justify-content: space-between"
    >
      <h3>Norish Quick Import</h3>
      <div>
        <button
          id="back"
          title="Back"
          style="border: none; background: transparent; cursor: pointer"
        >
          ✖
        </button>
        <button
          id="cog"
          title="Settings"
          style="border: none; background: transparent; cursor: pointer"
        >
          ⚙️
        </button>
      </div>
    </div>

    <div id="mainView">
      <label>Recipe URL</label>
      <div style="display: flex; gap: 8px; align-items: center">
        <input id="recipeUrl" placeholder="https://..." style="flex: 1; margin-bottom: 0" />
        <button id="import">Send</button>
      </div>
    </div>

    <div id="settingsView" style="display: none">
      <label>Instance domain</label>
      <input id="domain" placeholder="https://your.norish.domain" />
      <label>API key (x-api-key)</label>
      <input id="apiKey" placeholder="Enter API key" />
      <div class="row">
        <button id="save">Save</button>
      </div>
    </div>

    <div id="status" aria-live="polite" style="margin-top: 8px"></div>

    <script src="popup.js"></script>
  </body>
</html>
